spring:
  application:
    name: jake-notes
  datasource:
    url: "jdbc:postgresql://localhost:5432/jakenotes"
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    locations: /db/migration/common,/db/migration/development
  thymeleaf:
    cache: false
  web:
    resources:
      static:
        locations[0]: file:src/main/resources/static/
        locations[1]: classpath:/static/
  data:
    meilisearch:
      host: ${MEILI_HOST}
      masterKey: ${MEILI_MASTERKEY}
    gdrive:
      client_id: ${GDRIVE_CLIENT_ID}
      client_secret: ${GDRIVE_CLIENT_SECRET}
      access_token: ${GDRIVE_ACCESS_TOKEN}
      refresh_token: ${GDRIVE_CLIENT_ID}
      application_name: ${GDRIVE_APP_NAME}
      root_folder_id: ${GDRIVE_ROOT_FOLDER_ID}