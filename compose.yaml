services:
  db:
    container_name: postgresdb
    image: postgres
    env_file: ".env"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres:/var/lib/postgresql
    ports:
      - "${DB_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    env_file: ".env"
    volumes:
      - meilisearch:/data.ms
    environment:
      MEILI_NO_ANALYTICS: true
      MEILI_MASTER_KEY: ${MEILI_MASTERKEY}
      MEILI_ENV: "development"
      MEILI_HTTP_PAYLOAD_SIZE_LIMIT: 304857600



volumes:
  postgres:
  meilisearch: